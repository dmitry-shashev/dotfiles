# apply the config

# Reload config - <C-a>R

# install plugins - ctrl+a shift+I

# ----------------------------------------------------------------
# Theme - Catppuccin (Mocha)
set -g @plugin 'catppuccin/tmux#v2.1.3'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'default'

# Window tabs (centered, square)
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_window_current_left_separator ' '
set -g @catppuccin_window_current_middle_separator ' '
set -g @catppuccin_window_current_right_separator ' '
set -g @catppuccin_window_number_color '#{@thm_yellow}'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_number '#I'
set -g @catppuccin_window_current_number_color '#{@thm_peach}'
set -g @catppuccin_window_current_text_color '#{@thm_peach}'
set -g @catppuccin_window_current_number '#I'
set -g @catppuccin_window_current_text '#[fg=#11111b] #W'
set -g @catppuccin_window_number_position 'left'

set -g status-justify absolute-centre

# Left: current directory + size
set -g status-left-length 120
set -g @catppuccin_directory_text " #{pane_current_path} [#(du -sh \"#{pane_current_path}\" 2>/dev/null | cut -f1 | sed -E 's/([0-9.]+)K$/\\1KB/; s/([0-9.]+)M$/\\1MB/; s/([0-9.]+)G$/\\1GB/; s/([0-9.]+)T$/\\1TB/')]"
set -g status-left "#{E:@catppuccin_status_directory}"

# Right: cpu + ram + date/time
set -g status-right-length 120
set -g @catppuccin_cpu_text " #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)"
set -g @catppuccin_cpu_icon " "
set -g status-right "#{E:@catppuccin_status_cpu}#{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text " #(~/scripts/tmux-memory.sh)  %H:%M"

# ----------------------------------------------------------------

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'

set -g @resurrect-save-only 'console home'

# ----------------------------------------------------------------
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)

run -b '~/.tmux/plugins/tpm/tpm'

set -g mouse on

bind-key r source-file ~/.tmux.conf

# vim-like pane switching
bind-key k select-pane -U
bind-key j select-pane -D
bind-key h select-pane -L
bind-key l select-pane -R
unbind Up
unbind Down
unbind Left
unbind Right
unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right

# split window
bind-key v split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
bind-key b split-window -v -c "#{pane_current_path}"
bind-key e select-layout even-horizontal
unbind '"'
unbind %

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# change the order of tabs
# swap window to left or right
bind-key < swap-window -t -1
bind-key > swap-window -t +1

# go to copy-mode
bind i copy-mode

# clear history
bind c send-keys -R \; send-keys C-l \; clear-history \; send-keys C-U

# vim style selection
bind-key -T copy-mode-vi v send-keys -X begin-selection

# navigation between tabs
bind-key , previous-window
bind-key . next-window
bind-key t new-window
bind-key q kill-window

bind-key + resize-pane -U 10
bind-key _ resize-pane -D 10
bind-key = resize-pane -L 10
bind-key - resize-pane -R 10

# rename the tab
bind-key n command-prompt -I "#W" "rename-window '%%'"

# don't let programs or tmux rename windows automatically
set-option -g allow-rename off
set-option -g set-titles off
set-option -g automatic-rename off

set -g base-index 1       # Start numbering windows at 1, not 0.
set -g pane-base-index 1  # Start numbering panes at 1, not 0.
